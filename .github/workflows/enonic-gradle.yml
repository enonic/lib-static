name: Gradle Build

on: [ push ]

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      release: ${{ steps.build-and-publish.outputs.release }}
    steps:
      - id: build-and-publish
        uses: enonic/release-tools/build-and-publish@master
        with:
          repoUser: ci
          repoPassword: ${{ secrets.ARTIFACTORY_PASSWORD }}
          codecovToken: ${{ secrets.CODECOV_TOKEN }}
          releaseBranch: |
            master
            2.x

  release:
    runs-on: ubuntu-latest

    needs: build
    if: needs.build.outputs.release == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'

      - name: Set npm tag
        run: |
          VERSION=$(grep '^version' gradle.properties | cut -d'=' -f2 | tr -d ' ')
          if [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "NPM_TAG=latest" >> $GITHUB_ENV
          else
            echo "NPM_TAG=beta" >> $GITHUB_ENV
          fi

      - name: Build
        run: |
          npm ci
          npm run build

      - name: Publish
        run: npx -y npm@latest publish --tag $NPM_TAG
        working-directory: build/types

      - uses: enonic/release-tools/release@master
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
